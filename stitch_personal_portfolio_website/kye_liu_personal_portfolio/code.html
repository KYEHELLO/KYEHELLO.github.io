<style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .animate-pixel-blink {
      animation: blink 0.5s step-start infinite;
    }

    @keyframes bounce-orb {
      0%, 100% { transform: translate(120px, 0); }
      25% { transform: translate(60px, -40px); }
      50% { transform: translate(0, 0); }
      75% { transform: translate(60px, 40px); }
    }
    
    @keyframes chase-character {
      0%, 100% { transform: translate(80px, 0) scaleX(1); }
      25% { transform: translate(40px, -30px) scaleX(1); }
      50% { transform: translate(-20px, 0) scaleX(-1); }
      75% { transform: translate(40px, 30px) scaleX(1); }
    }

    .pixel-shadow-inset {
      box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.2), inset 4px 4px 0px 0px rgba(255,255,255,0.1);
    }

    .pixel-grid-bg {
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .pixel-art-character {
      width: 48px;
      height: 48px;
      background-color: #79ff5b; /* tertiary-fixed */
      position: relative;
      clip-path: polygon(
        /* Simple 8-bit head/body shape */
        20% 0%, 80% 0%, 80% 20%, 100% 20%, 100% 80%, 80% 80%, 80% 100%, 20% 100%, 20% 80%, 0% 80%, 0% 20%, 20% 20%
      );
    }

    .pixel-orb {
      width: 16px;
      height: 16px;
      background-color: #ffffff;
      clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
    }

    .loading-container {
      border: 4px solid #250259;
      box-shadow: 8px 8px 0px 0px #2A1454;
    }
  </style>
</head>
<body class="bg-primary-container m-0 overflow-hidden select-none">
<!-- Main Loading Canvas -->
<main class="relative w-screen h-screen flex flex-col items-center justify-center p-lg">
<!-- Retro Scanlines Effect Overlay -->
<div class="absolute inset-0 pointer-events-none z-10" style="background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 4px, 3px 100%;"></div>
<!-- Background Pixel Grid -->
<div class="absolute inset-0 pixel-grid-bg opacity-30"></div>
<!-- Center Animation Stage -->
<div class="relative flex flex-col items-center gap-md z-20">
<!-- The Animation Wrapper -->
<div class="relative w-64 h-48 flex items-center justify-center">
<!-- Bouncing Orb -->
<div class="absolute pixel-orb" style="animation: bounce-orb 2s infinite ease-in-out;"></div>
<!-- Chasing Character Silhouette -->
<div class="absolute pixel-art-character" style="animation: chase-character 2s infinite ease-in-out;">
<!-- Pixel Eye -->
<div class="absolute top-2 right-2 w-2 h-2 bg-primary"></div>
</div>
</div>
<!-- Loading Text Section -->
<div class="loading-container bg-surface px-md py-sm flex flex-col items-center">
<h1 class="font-headline-md text-headline-md text-primary tracking-widest animate-pixel-blink">
          LOADING...
        </h1>
<!-- Progress Bar (Static Visual) -->
<div class="mt-xs w-48 h-4 border-2 border-primary-container p-[2px] bg-white">
<div class="h-full bg-tertiary-fixed-dim transition-all duration-300" id="progress-bar" style="width: 35%;"></div>
</div>
<!-- Subtitle -->
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs opacity-75">
          INITIALIZING PIXELS
        </p>
</div>
</div>
<!-- Bottom Decorative Branding -->
<div class="absolute bottom-md left-0 w-full flex justify-center">
<div class="px-sm py-xs border-2 border-primary bg-primary-container text-primary-fixed font-label-sm text-label-sm uppercase tracking-tighter">
        KYE LIU SYSTEM V1.0.4
      </div>
</div>
<!-- Corner Accents -->
<div class="absolute top-sm left-sm w-8 h-8 border-t-4 border-l-4 border-tertiary-fixed-dim"></div>
<div class="absolute top-sm right-sm w-8 h-8 border-t-4 border-r-4 border-tertiary-fixed-dim"></div>
<div class="absolute bottom-sm left-sm w-8 h-8 border-b-4 border-l-4 border-tertiary-fixed-dim"></div>
<div class="absolute bottom-sm right-sm w-8 h-8 border-b-4 border-r-4 border-tertiary-fixed-dim"></div>
</main>
<script>
    // Simple script to simulate progress bar movement for visual flair
    const progressBar = document.getElementById('progress-bar');
    let width = 35;
    
    function animateProgress() {
      if (width < 95) {
        width += Math.random() * 2;
        progressBar.style.width = width + '%';
        
        // Random stutters to mimic authentic retro loading
        const delay = Math.random() > 0.8 ? 500 : 100;
        setTimeout(animateProgress, delay);
      } else {
        // Reset or stay near end
        setTimeout(() => {
            width = 35;
            animateProgress();
        }, 2000);
      }
    }

    animateProgress();

    // Sound effect simulation (visual only in this context)
    console.log("System Ready. Sound: 8-bit Oscillator Activated.");
  </script>
</body></html>
